<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Deep slate to rich space black for a premium SaaS feel -->
    <radialGradient id="bgGrad" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>

    <!-- Eye Contour Gradient: Energetic purple to glowing cyan -->
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Cursor Left Wing Gradient: Hot purple to deep indigo -->
    <linearGradient id="planeLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <!-- Cursor Right Wing Gradient: Bright cyan to vivid blue -->
    <linearGradient id="planeRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>

    <!-- Headset Arch Gradient: Metallic silver/slate -->
    <linearGradient id="archGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="50%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>

    <!-- Earpiece Gradient: Dark sleek glass with a hint of blue -->
    <linearGradient id="earpieceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Mic Tip Gradient: Glowing cyan -->
    <linearGradient id="micTipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Filters for Glow and Shadow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#020617" flood-opacity="0.7" />
    </filter>
  </defs>

  <!-- Main Background Squircle -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bgGrad)" />

  <!-- Background Technical Grid & Crosshairs -->
  <g opacity="0.4">
    <line x1="256" y1="16" x2="256" y2="496" stroke="rgba(255,255,255,0.04)" stroke-width="2" />
    <line x1="16" y1="240" x2="496" y2="240" stroke="rgba(255,255,255,0.04)" stroke-width="2" />
    <circle cx="256" cy="240" r="140" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="2" stroke-dasharray="4 8" />
  </g>

  <!-- OS Window Context Dots (Represents the user's screen/UI) -->
  <g opacity="0.9">
    <circle cx="86" cy="86" r="6" fill="#ef4444" />
    <circle cx="110" cy="86" r="6" fill="#f59e0b" />
    <circle cx="134" cy="86" r="6" fill="#10b981" />
  </g>

  <!-- "Vision" Element: The Eye watching the screen -->
  <g filter="url(#glow)">
    <path d="M 156 165 C 206 100 306 100 356 165 C 306 230 206 230 156 165 Z" 
          fill="rgba(6, 182, 212, 0.04)" 
          stroke="url(#eyeGrad)" 
          stroke-width="3" />
    <!-- Inner Lens Ring -->
    <circle cx="256" cy="165" r="30" fill="none" stroke="rgba(6, 182, 212, 0.4)" stroke-width="1.5" stroke-dasharray="2 4" />
  </g>

  <!-- "Pilot" Element: The Cursor/Airplane breaking out of the eye -->
  <g filter="url(#shadow)">
    <!-- Left Wing -->
    <path d="M 256 80 L 186 250 L 256 200 Z" fill="url(#planeLeft)" />
    <!-- Right Wing -->
    <path d="M 256 80 L 326 250 L 256 200 Z" fill="url(#planeRight)" />
    
    <!-- Central seam highlight for 3D depth -->
    <line x1="256" y1="80" x2="256" y2="200" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />
  </g>

  <!-- Magical/Guiding Star at the tip of the cursor -->
  <circle cx="256" cy="80" r="4" fill="#ffffff" filter="url(#glow)" />
  <circle cx="256" cy="80" r="10" fill="rgba(255, 255, 255, 0.2)" filter="url(#glow)" />

  <!-- "Support" Element: Headset Arch framing the vision -->
  <path d="M 130 240 V 190 A 126 126 0 0 1 382 190 V 240" 
        fill="none" 
        stroke="url(#archGrad)" 
        stroke-width="16" 
        stroke-linecap="round" 
        filter="url(#shadow)" />
        
  <!-- Headset Arch Inner Highlight for metallic realism -->
  <path d="M 134 240 V 190 A 122 122 0 0 1 378 190 V 240" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="2" 
        opacity="0.5" 
        stroke-linecap="round" />

  <!-- Headset Earpieces -->
  <g filter="url(#shadow)">
    <!-- Left Earpiece -->
    <rect x="110" y="210" width="40" height="80" rx="20" fill="url(#earpieceGrad)" stroke="#334155" stroke-width="2" />
    <rect x="122" y="222" width="16" height="56" rx="8" fill="#3b82f6" opacity="0.15" />
    
    <!-- Right Earpiece -->
    <rect x="362" y="210" width="40" height="80" rx="20" fill="url(#earpieceGrad)" stroke="#334155" stroke-width="2" />
    <rect x="374" y="222" width="16" height="56" rx="8" fill="#3b82f6" opacity="0.15" />
  </g>

  <!-- Microphone Boom & Voice Element -->
  <!-- Boom arm -->
  <path d="M 382 270 Q 382 360 270 360" 
        fill="none" 
        stroke="#94a3b8" 
        stroke-width="10" 
        stroke-linecap="round" 
        filter="url(#shadow)" />
        
  <!-- Boom highlight -->
  <path d="M 380 270 Q 380 358 270 358" 
        fill="none" 
        stroke="#f8fafc" 
        stroke-width="2" 
        opacity="0.5" 
        stroke-linecap="round" />

  <!-- Mic Tip -->
  <g filter="url(#glow)">
    <circle cx="270" cy="360" r="12" fill="url(#micTipGrad)" />
    <!-- Mic Tip Rings -->
    <circle cx="270" cy="360" r="18" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.5" />
    <circle cx="270" cy="360" r="24" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.2" />
  </g>

  <!-- Active Voice Audio Waves -->
  <g filter="url(#glow)" stroke="#06b6d4" stroke-width="4" stroke-linecap="round" fill="none">
    <path d="M 240 348 Q 230 360 240 372" opacity="1.0" />
    <path d="M 228 338 Q 212 360 228 382" opacity="0.7" />
    <path d="M 216 328 Q 194 360 216 392" opacity="0.4" />
  </g>

  <!-- Glowing Particles / AI Dust -->
  <circle cx="180" cy="110" r="2.5" fill="#a855f7" filter="url(#glow)" opacity="0.8" />
  <circle cx="340" cy="120" r="3" fill="#06b6d4" filter="url(#glow)" opacity="0.9" />
  <circle cx="210" cy="270" r="2" fill="#3b82f6" opacity="0.6" />
  <circle cx="310" cy="280" r="2.5" fill="#a855f7" opacity="0.5" />

  <!-- Brand Lockup -->
  <text x="256" y="440" 
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="30" 
        font-weight="700" 
        fill="#ffffff" 
        text-anchor="middle" 
        letter-spacing="0.5">
    Support<tspan fill="#06b6d4">Pilot</tspan>
  </text>
  
</svg>