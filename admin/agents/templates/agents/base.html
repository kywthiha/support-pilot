<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}SupportPilot Admin{% endblock %}</title>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <style>
      :root {
        /* Premium SaaS Color Palette */
        --primary-color: #4f46e5; /* Indigo 600 */
        --primary-hover: #4338ca; /* Indigo 700 */
        --bg-color: #f3f4f6; /* Gray 100 */
        --card-bg: #ffffff;
        --border-color: #e5e7eb; /* Gray 200 */
        --text-main: #111827; /* Gray 900 */
        --text-muted: #6b7280; /* Gray 500 */
        --success: #10b981;
        --danger: #ef4444;
        --info: #3b82f6;
      }

      body {
        background: var(--bg-color);
        background-image:
          radial-gradient(
            at 0% 0%,
            hsla(253, 16%, 7%, 0.02) 0,
            transparent 50%
          ),
          radial-gradient(
            at 50% 0%,
            hsla(225, 39%, 30%, 0.02) 0,
            transparent 50%
          ),
          radial-gradient(
            at 100% 0%,
            hsla(339, 49%, 30%, 0.02) 0,
            transparent 50%
          );
        color: var(--text-main);
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }

      /* Navbar / Header Styling */
      .navbar {
        background-color: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(229, 231, 235, 0.5);
        box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.02), 0 1px 2px -1px rgb(0 0 0 / 0.02);
        padding: 1rem 0;
        position: sticky;
        top: 0;
        z-index: 1000;
        transition: background-color 0.3s ease;
      }
      .navbar-brand {
        font-weight: 800;
        font-size: 1.35rem;
        color: var(--text-main);
        letter-spacing: -0.03em;
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .navbar-brand i {
        color: var(--primary-color);
        font-size: 1.6rem;
      }

      /* Card Elements */
      .card {
        background: var(--card-bg);
        border: 1px solid rgba(229, 231, 235, 0.8);
        border-radius: 20px;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.03), 0 2px 4px -2px rgb(0 0 0 / 0.03);
        transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.25s ease;
      }
      .card:hover {
        border-color: #c7d2fe;
        box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.05);
        transform: translateY(-3px);
      }
      .card-header {
        background-color: transparent;
        border-bottom: 1px solid rgba(229, 231, 235, 0.8);
        padding: 1.25rem 1.5rem;
        border-top-left-radius: 20px !important;
        border-top-right-radius: 20px !important;
      }
      .card-body {
        padding: 1.5rem;
      }
      .card-title {
        font-weight: 700;
        color: var(--text-main);
        letter-spacing: -0.01em;
        margin-bottom: 0.75rem;
      }
      .card-footer {
        border-top: 1px solid rgba(229, 231, 235, 0.8);
        background-color: #fafafa;
        border-bottom-left-radius: 20px !important;
        border-bottom-right-radius: 20px !important;
        padding: 1.25rem 1.5rem;
      }

      /* Buttons Update */
      .btn {
        font-weight: 500;
        border-radius: 8px;
        padding: 0.5rem 1rem;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .btn-sm {
        padding: 0.35rem 0.8rem;
        font-size: 0.875rem;
      }

      .btn-primary {
        background-color: var(--primary-color);
        border-color: var(--primary-color);
        color: #ffffff;
        box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      }
      .btn-primary:hover,
      .btn-primary:focus {
        background-color: var(--primary-hover);
        border-color: var(--primary-hover);
        transform: translateY(-1px);
        box-shadow: 0 4px 6px -1px rgb(79 70 229 / 0.25);
      }

      .btn-outline-primary {
        border-color: #c7d2fe;
        color: var(--primary-color);
        background: transparent;
      }
      .btn-outline-primary:hover {
        background-color: var(--primary-color);
        color: #ffffff;
        border-color: var(--primary-color);
      }

      .btn-outline-secondary {
        color: var(--text-main);
        border-color: #d1d5db;
        background-color: #ffffff;
        box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      }
      .btn-outline-secondary:hover {
        background-color: #f3f4f6;
        color: var(--text-main);
        border-color: #9ca3af;
      }

      /* Badges & Text */
      .badge {
        font-weight: 600;
        padding: 0.35em 0.65em;
        border-radius: 6px;
      }
      .badge.bg-secondary {
        background-color: #f3f4f6 !important;
        color: var(--text-muted);
        border: 1px solid var(--border-color);
      }
      .badge-demo {
        background-color: #e0e7ff;
        color: #4338ca;
        border: 1px solid #c7d2fe;
      }
      .text-secondary {
        color: var(--text-muted) !important;
      }

      /* Form Controls */
      label.form-label {
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--text-main);
        margin-bottom: 0.4rem;
        letter-spacing: -0.01em;
      }
      .form-control,
      .form-select {
        background-color: #fcfcfc;
        border: 1px solid #d1d5db;
        color: var(--text-main);
        border-radius: 12px;
        padding: 0.75rem 1rem;
        box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.02) inset;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .form-control:focus,
      .form-select:focus {
        background-color: #ffffff;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        color: var(--text-main);
        outline: none;
      }
      .form-text {
        color: var(--text-muted);
        font-size: 0.8125rem;
        margin-top: 0.375rem;
      }

      /* Specific Components */
      .table {
        --bs-table-bg: transparent;
        --bs-table-border-color: var(--border-color);
        margin-bottom: 0;
      }
      .table th {
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
      }
      .table td {
        vertical-align: middle;
        color: var(--text-main);
      }

      .alert {
        border-radius: 12px;
        font-weight: 500;
        border: none;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      }

      .page-header {
        padding: 2.5rem 0 2rem;
      }
      .page-header h2 {
        font-weight: 800;
        letter-spacing: -0.025em;
        color: var(--text-main);
        margin-bottom: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .doc-item {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 1rem 1.25rem;
        margin-bottom: 0.75rem;
        box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.05);
        transition: all 0.2s ease;
      }
      .doc-item:hover {
        border-color: #d1d5db;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
      }

      .auth-card {
        max-width: 440px;
        margin: 5rem auto;
      }
      .errorlist {
        list-style: none;
        padding: 0;
        margin: 0.375rem 0 0;
      }
      .errorlist li {
        color: var(--danger);
        font-size: 0.8125rem;
        font-weight: 500;
      }

      /* UI Enhancements */
      .text-primary {
        color: var(--primary-color) !important;
      }
      .text-success {
        color: var(--success) !important;
      }
      .text-info {
        color: var(--info) !important;
      }
      .bg-primary {
        background-color: var(--primary-color) !important;
      }
      .bg-google {
        background-color: #4285F4 !important;
        color: #ffffff !important;
      }
      .text-google {
        color: #4285F4 !important;
      }

      /* Form Switches */
      .form-switch .form-check-input {
        width: 2.5em;
        height: 1.25em;
        margin-top: 0.1em;
      }
      .form-switch .form-check-input:checked {
        background-color: var(--primary-color);
        border-color: var(--primary-color);
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg mb-4">
      <div class="container">
        <a class="navbar-brand" href="{% url 'agent_list' %}">
          <i class="bi bi-headset text-primary"></i>
          <span class="d-none d-sm-inline">SupportPilot</span>
        </a>

        {% if user.is_authenticated %}
        <div class="d-flex align-items-center gap-2 gap-sm-4">
          <a
            class="btn btn-primary btn-sm d-flex align-items-center gap-2"
            href="{% url 'agent_create' %}"
          >
            <i class="bi bi-plus-lg"></i>
            <span class="d-none d-md-inline">New Agent</span>
          </a>

          <div
            class="d-flex align-items-center gap-2 border-start ps-2 ps-sm-4"
          >
            <div
              class="d-none d-lg-flex align-items-center text-secondary small fw-medium"
            >
              <i class="bi bi-person-circle fs-5 me-2"></i>
              {{ user.email }}
            </div>
            <a
              href="{% url 'logout' %}"
              class="btn btn-outline-secondary btn-sm ms-2"
              title="Logout"
            >
              <i class="bi bi-box-arrow-right"></i>
              <span class="d-none d-md-inline">Logout</span>
            </a>
          </div>
        </div>
        {% endif %}
      </div>
    </nav>

    <div class="container pb-5">
      {% if messages %}
      <div class="mb-4">
        {% for message in messages %}
        <div
          class="alert alert-{{ message.tags }} alert-dismissible fade show d-flex align-items-center mb-2"
          role="alert"
        >
          <i
            class="bi {% if message.tags == 'success' %}bi-check-circle-fill text-success{% elif message.tags == 'error' %}bi-exclamation-triangle-fill text-danger{% else %}bi-info-circle-fill text-info{% endif %} fs-5 me-3"
          ></i>
          <div>{{ message }}</div>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="alert"
            aria-label="Close"
          ></button>
        </div>
        {% endfor %}
      </div>
      {% endif %} {% block content %}{% endblock %}
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
